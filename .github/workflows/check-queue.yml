name: Check for New Speedruns

on:
  schedule:
    # Exécute le script toutes les 5 minutes
    - cron: "*/5 * * * *"
  workflow_dispatch: # Permet de lancer manuellement depuis l'onglet Actions de GitHub

jobs:
  check-runs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Restore previous run state (cache)
        uses: actions/cache/restore@v4
        with:
          path: state
          key: run-state-${{ github.run_id }}
          restore-keys: |
            run-state-

      - name: Run the checker script
        run: python checker.py

      - name: Save new run state (cache)
        uses: actions/cache/save@v4
        with:
          path: state
          key: run-state-${{ github.run_id }}